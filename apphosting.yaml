kind: "AppHostingYaml"
schemaVersion: "v1"

runConfig:
  # Untuk backend Landing Page, pastikan arahnya ke sini
  basePath: "apps/landing-page" 

scripts:
  # Menggunakan pnpm filter agar build tepat sasaran
  build: "pnpm --filter landing-page build"
  run: "pnpm --filter landing-page start"

environmentVariables:
  - variable: "NODE_VERSION"
    value: "20"